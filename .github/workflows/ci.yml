name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Format / Lint / Type-check / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prettier (check only)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Astro / TypeScript check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          # Stub secrets so the build doesn't fail importing API routes.
          # No external calls happen during the static build.
          GOOGLE_GENERATIVE_AI_API_KEY: stub
          UPSTASH_VECTOR_REST_URL: https://stub.upstash.io
          UPSTASH_VECTOR_REST_TOKEN: stub
          UPSTASH_REDIS_REST_URL: https://stub.upstash.io
          UPSTASH_REDIS_REST_TOKEN: stub
          RESEND_API_KEY: stub

  unit:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run vitest
        run: npm run test:unit -- --run

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright
        run: npm run test:e2e
        env:
          # E2E suite doesn't hit /api/chat or /api/contact, but the dev
          # server still imports those modules at startup. Stub values keep
          # client constructors happy without enabling real network calls.
          GOOGLE_GENERATIVE_AI_API_KEY: stub
          UPSTASH_VECTOR_REST_URL: https://stub.upstash.io
          UPSTASH_VECTOR_REST_TOKEN: stub
          UPSTASH_REDIS_REST_URL: https://stub.upstash.io
          UPSTASH_REDIS_REST_TOKEN: stub
          RESEND_API_KEY: stub

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
