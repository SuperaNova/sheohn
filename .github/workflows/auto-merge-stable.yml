name: Dependabot Auto-Merge (Stable)

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'SuperaNova' # Only run on the main repo
    steps:
      - name: Auto-merge stable Dependabot PRs
        uses: actions/github-script@v8
        with:
          script: |
            const daysToWait = 7;
            const now = new Date();
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: 'dependabot/'
            });

            for (const pr of prs.data) {
              const createdAt = new Date(pr.created_at);
              const ageInDays = (now - createdAt) / (1000 * 60 * 60 * 24);

              if (ageInDays >= daysToWait) {
                console.log(`PR #${pr.number} is ${ageInDays.toFixed(1)} days old. Checking checks...`);
                
                const checks = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: pr.head.sha
                });

                const allPassed = checks.data.check_runs.every(run => run.conclusion === 'success');
                
                if (allPassed && checks.data.total_count > 0) {
                  console.log(`Merging PR #${pr.number}...`);
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: 'squash'
                  });
                } else {
                  console.log(`Skipping PR #${pr.number}: Checks have not all passed or are missing.`);
                }
              } else {
                console.log(`Skipping PR #${pr.number}: Only ${ageInDays.toFixed(1)} days old.`);
              }
            }
